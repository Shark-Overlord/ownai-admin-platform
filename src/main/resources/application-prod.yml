# Production configuration.
# Secrets must be provided by environment variables on the server.

server:
  port: ${SERVER_PORT:8011}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/my_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:my_db}
    password: ${DB_PASSWORD:}
  redis:
    database: ${REDIS_DATABASE:1}
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: ${REDIS_TIMEOUT:5000}
    password: ${REDIS_PASSWORD:}
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

mybatis-plus:
  configuration:
    log-impl: ''

cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}

knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  openapi:
    title: API
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.yupi.springbootinit.controller

wx:
  mp:
    token: ${WX_MP_TOKEN:}
    aesKey: ${WX_MP_AES_KEY:}
    appId: ${WX_MP_APP_ID:}
    secret: ${WX_MP_SECRET:}
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        host: ${REDIS_HOST:127.0.0.1}
        port: ${REDIS_PORT:6379}
      type: Memory
  open:
    appId: ${WX_OPEN_APP_ID:}
    appSecret: ${WX_OPEN_APP_SECRET:}
